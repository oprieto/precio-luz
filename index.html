<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Precio Luz por Hora</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #070b14;
  --text: #f1f5f9;
  --muted: #94a3b8;

  --green: rgba(34, 197, 94, 0.35);
  --green-border: #22c55e;

  --purple: rgba(168, 85, 247, 0.35);
  --purple-border: #a855f7;

  --red: rgba(239, 68, 68, 0.35);
  --red-border: #ef4444;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #111827, #070b14);
  color: var(--text);
  display: flex;
  justify-content: center;
  padding: 40px 16px;
}

.container {
  width: 100%;
  max-width: 980px;
}

.card {
  background: rgba(15, 23, 42, 0.85);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 20px;
  backdrop-filter: blur(12px);
}

h1 {
  font-size: 18px;
  margin: 0 0 14px;
  font-weight: 600;
}

/* CONTROLES */
.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  align-items: center;
}

/* FIX DEL INPUT (IMPORTANTE) */
input[type="date"] {
  flex: 1;
  width: 100%;
  min-width: 0;   /* 🔥 FIX PRINCIPAL */
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: #0b1220;
  color: var(--text);
  box-sizing: border-box;
}

input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(1);
  cursor: pointer;
}

button {
  padding: 12px 16px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #4f46e5, #3b82f6);
  color: white;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-1px);
  opacity: 0.95;
}

.status {
  font-size: 13px;
  margin: 8px 0;
  color: var(--muted);
}

.error {
  color: #fb7185;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  border-radius: 12px;
  overflow: hidden;
}

th {
  text-align: left;
  font-size: 12px;
  color: var(--muted);
  padding: 12px;
  background: rgba(255,255,255,0.04);
}

td {
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

tr:hover {
  filter: brightness(1.2);
}

/* COLORES */
.green {
  background: var(--green);
  border-left: 4px solid var(--green-border);
  font-weight: 600;
}

.purple {
  background: var(--purple);
  border-left: 4px solid var(--purple-border);
  font-weight: 600;
}

.red {
  background: var(--red);
  border-left: 4px solid var(--red-border);
  font-weight: 600;
}

/* 📱 RESPONSIVE */
@media (max-width: 600px) {
  body {
    padding: 20px 12px;
  }

  .card {
    padding: 16px;
  }

  .controls {
    flex-direction: column;
    align-items: stretch;
  }

  input[type="date"],
  button {
    width: 100%;
  }

  input[type="date"] {
    min-width: 0; /* 🔥 refuerzo móvil */
  }

  button {
    padding: 14px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>Precio de la luz por hora</h1>

    <div class="controls">
      <input type="date" id="fecha">
      <button onclick="cargarDatos()">Consultar</button>
    </div>

    <div id="status" class="status"></div>
    <div id="resultado"></div>

  </div>
</div>

<script>
async function cargarDatos() {
  const fecha = document.getElementById("fecha").value;
  const resultado = document.getElementById("resultado");
  const status = document.getElementById("status");

  resultado.innerHTML = "";

  if (!fecha) {
    status.innerHTML = "<span class='error'>Selecciona una fecha</span>";
    return;
  }

  const url = `https://api.esios.ree.es/archives/70/download_json?locale=es&date=${fecha}`;

  status.innerHTML = "Cargando datos...";

  try {
    const res = await fetch(url);
    const data = await res.json();

    status.innerHTML = "";

    const resultadoFormateado = data.PVPC.map(item => ({
      hora: item.Hora,
      pcb: Math.round((parseFloat(item.PCB.replace(",", ".")) / 1000) * 100) / 100
    }));

    const preciosUnicos = [...new Set(resultadoFormateado.map(x => x.pcb))]
      .sort((a, b) => a - b);

    const masBarata = preciosUnicos[0];
    const segundaBarata = preciosUnicos[1];
    const masCara = preciosUnicos[preciosUnicos.length - 1];

    let html = `
      <table>
        <thead>
          <tr>
            <th>Hora</th>
            <th>€/kWh</th>
          </tr>
        </thead>
        <tbody>
    `;

    resultadoFormateado.forEach(item => {
      let clase = "";

      if (item.pcb === masBarata) clase = "green";
      else if (item.pcb === segundaBarata) clase = "purple";
      else if (item.pcb === masCara) clase = "red";

      html += `
        <tr class="${clase}">
          <td>${item.hora}</td>
          <td>${item.pcb.toFixed(2)} €</td>
        </tr>
      `;
    });

    html += "</tbody></table>";
    resultado.innerHTML = html;

  } catch (err) {
    status.innerHTML = "<span class='error'>Error al cargar datos</span>";
    console.error(err);
  }
}
</script>

</body>
</html>
